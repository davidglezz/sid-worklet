<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SID worklet</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="visualizer" width="640" height="96"></canvas>
      <h1>SID worklet</h1>
      <div class="controls">
        <button id="play" class="btn--icon" type="button">
          <svg class="btn__play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <title>play</title>
            <path d="M8,5.14V19.14L19,12.14L8,5.14Z" />
          </svg>
          <svg class="btn__stop" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <title>stop</title>
            <path d="M18,18H6V6H18V18Z" />
          </svg>
        </button>
        <div class="position flex-col flex-fill">
          <label for="position">-</label>
          <span id="time-indicator">00:00 / --:--</span>
          <input id="position" type="range" min="0" max="0" step="1" value="0" />
        </div>
        <div class="subsong flex-col">
          <label for="subsong">Subsong</label>
          <select id="subsong" disabled></select>
        </div>
        <div class="volume flex-col">
          <label for="volume">100%</label>
          <input id="volume" type="range" min="0.0" max="1.0" step="0.01" value="1.0" />
        </div>
      </div>
      <div class="list" id="songlist"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
